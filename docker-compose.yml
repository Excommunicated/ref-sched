version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: referee-scheduler-db
    environment:
      POSTGRES_USER: referee_scheduler
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: referee_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referee_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: referee-scheduler-backend
    environment:
      DATABASE_URL: postgres://referee_scheduler:dev_password@db:5432/referee_scheduler?sslmode=disable
      PORT: 8080
      SESSION_SECRET: dev_session_secret_change_in_production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: http://localhost:8080/api/auth/google/callback
      FRONTEND_URL: http://localhost:3000
      ENV: development
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: referee-scheduler-frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
